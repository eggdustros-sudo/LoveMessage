<!DOCTYPE html>
<html>
<head>
    <title>MyLoveMessageForChescka</title>

    <style>
        body {
            background: black;
            color: hotpink;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .box {
            border: 2px solid hotpink;
            padding: 30px;
            width: 500px;
            text-align: center;

            box-shadow: 0 0 20px hotpink;

            animation: flicker 0.1s infinite alternate;
        }

        h1 {
            text-shadow: 0 0 10px hotpink;
        }

        #text {
            min-height: 60px;
        }

        @keyframes flicker {
            from { opacity: 1; }
            to { opacity: 0.85; }
        }
    </style>
</head>

<body>

<div class="box">
    <h1>MY LOVE MESSAGE FOR CHESCKA</h1>
    <p id="text">Click anywhere to continue.</p>
</div>

<!-- Typing Sound -->
<audio id="TypeSound">
    <source src="index_message_2.wav" type="audio/mpeg">
</audio>

<audio id="endSound">
    <source src="index_message_1.wav" type="audio/mpeg">
</audio>
<script>

const messages = [
    "Hello My Love, You Are The Most Beautiful Person I Have Ever Met.",
    "I Want You To Know How Much I Care About You.",
    "You Make My Heart Skip A Beat Every Time I See You.",
    "You Are The Light Of My Life.",
    "I Love You More Than Words Can Express."
];

let index = 0;
let typing = false;

function typeMessage(message) {

    if (typing) return;

    typing = true;

    const textElement = document.getElementById("text");
    const sound = document.getElementById("TypeSound");

    textElement.innerText = "";

    let i = 0;

    const interval = setInterval(() => {

        textElement.innerText += message[i];

        sound.currentTime = 0;
        sound.play();

        i++;

        if (i >= message.length) {
            clearInterval(interval);
            typing = false;
        }

    }, 50); // typing speed

}

document.body.addEventListener("click", () => {

    typeMessage(messages[index]);

    index++;

    if (index >= messages.length) {
        index = 0;
    }
});

</script>

</body>
</html>
